interface:
  display_name: "IoTDB SQL Testcase Pipeline"
  short_description: "IoTDB SQL cases, .run, setup/test execution"
  default_prompt: "Use $iotdb-sql-testcase-pipeline to search the official TimechoDB/IoTDB user manual by default when requirements, design docs, or issues are provided without docs links, generate detailed Markdown cases, auto-generate .run files, verify the provided IoTDB and SQL-test directories, configure tree/table mode for 1C1D or 3C3D from one cluster host, sync dn_rpc_address with iotdbURL on fixed port 6667, use no query parameters for tree mode, run setup then clean/restart and run test, automatically analyze .result/.out differences when COMPARE RESULT fails, ignore Elapsed Time/COMPARE status lines, ask only whether to rerun comparison or append mask columns to special_query.csv, collect artifacts, and build the fixed report."

policy:
  allow_implicit_invocation: true
