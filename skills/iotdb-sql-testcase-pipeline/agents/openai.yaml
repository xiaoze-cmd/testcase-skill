interface:
  display_name: "IoTDB SQL Testcase Pipeline"
  short_description: "Generate detailed SQL cases, test-point matrices, and related artifacts"
  default_prompt: "Use the IoTDB/TimechoDB SQL testcase pipeline: first build an atomic test-point matrix from the requirement and official manual, then create a test-point expansion table so complex points are not reduced to one case each, and finally output detailed Markdown cases and any routed artifacts such as .run, benchmark configs, or wrappers; do not perform remote execution. All user-visible explanations must be in Simplified Chinese."

policy:
  allow_implicit_invocation: true
